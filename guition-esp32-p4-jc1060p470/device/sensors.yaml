sensor:
  # Température intérieure
  - platform: homeassistant
    id: indoor_temperature
    entity_id: sensor.office_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%.0f° / -°"
            args:
              - x

  # Température extérieure
  - platform: homeassistant
    id: outdoor_temperature
    entity_id: sensor.outdoor_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%.0f° / %.0f°"
            args:
              - id(indoor_temperature).state
              - x

  # Luminosité Bureau
  - platform: homeassistant
    id: bureau_brightness
    entity_id: light.ampoule_bureau
    attribute: brightness
    internal: true
    filters:
      - multiply: 0.3921568627
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_light) == "light.ampoule_bureau";'
          then:
            - lvgl.label.update:
                id: selected_light_brightness
                text:
                  format: "Lum : %.0f%%"
                  args:
                    - x

  # Luminosité Fado bureau
