        # Panneau latéral
        - obj:
            id: side_panel
            width: 250
            height: 100%
            bg_color: 0x111111
            bg_opa: COVER
            radius: 12
            pad_all: 14
            border_width: 1
            border_color: 0x2A2A2A
            layout:
              type: flex
              flex_flow: column
              pad_row: 12
            widgets:
              - label:
                  id: selected_light_title
                  text: "Aucune sélection"
                  text_color: 0xFFFFFF
              - label:
                  id: selected_light_build
                  text: "CTX: 11aeb06"
                  text_color: 0x888888

              - button:
                  id: selected_light_toggle_button
                  height: 48
                  width: 100%
                  styles: control
                  on_press:
                    - script.execute: toggle_selected_light
                  widgets:
                    - label:
                        id: selected_light_toggle_label
                        text: "ON / OFF"
                        align: center

              - label:
                  id: selected_light_brightness
                  text: "Lum : --"
                  text_color: 0xCCCCCC

              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: row
                    pad_column: 8
                  widgets:
                    - button:
                        id: quick_25_button
                        height: 44
                        width: 70
                        styles: control
                        on_press:
                          - script.execute:
                              id: set_selected_light_brightness
                              brightness_pct: 25
                        widgets:
                          - label:
                              text: "25%"
                              align: center

                    - button:
